<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Farmacie</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #eef3f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            width: 100%;
            max-width: 430px;
            background: white;
            border-radius: 24px;
            padding: 40px 36px;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
        }

        .subtitle {
            margin: 0 0 8px 0;
            color: #64748b;
            font-size: 15px;
        }

        h1 {
            margin: 0 0 28px 0;
            font-size: 48px;
            line-height: 1.05;
            color: #0f172a;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #0f172a;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid #cbd5e1;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 18px;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: none;
            background: #2563eb;
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 24px rgba(37, 99, 235, 0.25);
        }

        .message {
            margin-bottom: 16px;
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 14px;
        }

        .error {
            background: #fee2e2;
            color: #b91c1c;
        }

        .success {
            background: #dcfce7;
            color: #166534;
        }

        .register-link {
            margin-top: 22px;
            color: #475569;
            font-size: 15px;
        }

        .register-link a {
            color: #2563eb;
            font-weight: 600;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="login-card">
    <p class="subtitle">Autentificare</p>
    <h1>Login</h1>

    <div id="errorBox" class="message error" style="display:none;">
        Username sau parolă incorectă.
    </div>

    <div id="logoutBox" class="message success" style="display:none;">
        Te-ai delogat cu succes.
    </div>

    <form method="post" action="/login">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" required>

        <button type="submit">Sign in</button>
    </form>

    <p class="register-link">
        Nu ai cont? <a href="http://localhost:5173/register">Register</a>
    </p>
</div>

<script>
    const params = new URLSearchParams(window.location.search);

    if (params.has("error")) {
        document.getElementById("errorBox").style.display = "block";
    }

    if (params.has("logout")) {
        document.getElementById("logoutBox").style.display = "block";
    }
</script>
</body>
</html>
