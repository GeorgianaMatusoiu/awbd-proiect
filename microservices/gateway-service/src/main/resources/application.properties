spring.application.name=gateway-service
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.server.webflux.routes[0].id=client-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://client-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/clienti/**,/api/profiluri/**,/api/carduri/**

spring.cloud.gateway.server.webflux.routes[1].id=medicament-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://medicament-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/medicamente/**,/api/categorii/**,/api/prospecte/**,/api/furnizori/**

spring.cloud.gateway.server.webflux.routes[2].id=reteta-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://reteta-service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/retete/**,/api/detalii-retete/**

management.endpoints.web.exposure.include=health,info,gateway